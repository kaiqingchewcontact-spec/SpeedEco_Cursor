name: speedeco
description: "SpeedEco — Go Fast, Stay Green. Eco-conscious speed for daily life."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  flutter_animate: ^4.5.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
